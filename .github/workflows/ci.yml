name: CI

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Test and Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint (non-blocking)
        continue-on-error: true
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend Test and Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run lint (non-blocking)
        continue-on-error: true
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build backend
        run: npm run build

  security-gates:
    name: Security Gates
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend WebSocket security tests
        run: npx vitest run src/services/conversation.service.security.test.ts

      - name: Frontend dependency audit (critical)
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=critical

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npm run prisma:generate
        working-directory: backend

      - name: Backend security test suite
        run: >-
          npx vitest run --config ./vitest.config.ts
          src/common/services/tenant-guard.service.test.ts
          src/modules/knowledge/knowledge.schemas.fuzz.test.ts
          src/security/query-safety.guard.test.ts
          src/services/rag/rag.service.test.ts
        working-directory: backend

      - name: Backend dependency audit (critical)
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=critical
        working-directory: backend

  deploy-development:
    name: Deploy Development
    runs-on: ubuntu-latest
    needs: [frontend, backend, security-gates]
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    environment:
      name: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to development
        run: echo "Deploy development environment here"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [frontend, backend, security-gates]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to production
        run: echo "Deploy production environment here"
