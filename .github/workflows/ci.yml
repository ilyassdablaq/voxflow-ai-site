name: CI

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  frontend:
    name: Frontend Test and Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint (non-blocking)
        continue-on-error: true
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Run SEO consistency check
        run: npm run seo:check

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend Test and Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run lint (non-blocking)
        continue-on-error: true
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build backend
        run: npm run build

  security-static-analysis:
    name: Security Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep security scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            returntocorp/semgrep:latest \
            semgrep scan --config p/default --error --metrics=off /src

  zap-dast:
    name: ZAP DAST Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify ZAP target URL is configured
        id: zap-config
        env:
          ZAP_TARGET_URL: ${{ secrets.ZAP_TARGET_URL }}
        run: |
          if [ -z "$ZAP_TARGET_URL" ]; then
            echo "run_scan=false" >> "$GITHUB_OUTPUT"
            echo "ZAP_TARGET_URL secret is not set. Skipping ZAP scan."
          elif ! curl --silent --show-error --head --max-time 10 "$ZAP_TARGET_URL" >/dev/null; then
            echo "run_scan=false" >> "$GITHUB_OUTPUT"
            echo "ZAP target is not reachable from CI runner. Skipping ZAP scan."
          else
            echo "run_scan=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run OWASP ZAP baseline (non-blocking)
        if: steps.zap-config.outputs.run_scan == 'true'
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ secrets.ZAP_TARGET_URL }}
          fail_action: false
          allow_issue_writing: false
          cmd_options: '-m 5 -T 60 -I'

  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gitleaks with SARIF output
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:latest dir \
            /repo \
            --redact \
            --report-format sarif \
            --report-path /repo/gitleaks.sarif \
            --exit-code 1

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend dependency audit
        if: github.ref == 'refs/heads/main'
        run: npm audit --omit=dev --audit-level=high

      - name: Frontend dependency audit (tolerant off-main)
        if: github.ref != 'refs/heads/main'
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Backend dependency audit
        if: github.ref == 'refs/heads/main'
        working-directory: backend
        run: npm audit --omit=dev --audit-level=high

      - name: Backend dependency audit (tolerant off-main)
        if: github.ref != 'refs/heads/main'
        working-directory: backend
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high

  deploy-development:
    name: Deploy Development
    runs-on: ubuntu-latest
    needs: [frontend, backend, security-static-analysis, dependency-scan, zap-dast, secret-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    environment:
      name: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to development
        run: echo "Deploy development environment here"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [frontend, backend, security-static-analysis, dependency-scan, zap-dast, secret-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to production
        run: echo "Deploy production environment here"
