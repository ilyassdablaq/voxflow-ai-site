name: Keep Backend Alive

on:
  schedule:
    # Führe alle 10 Minuten aus (vor der 15-min Render-Grenze)
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Validate BACKEND_URL secret
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "Missing required secret: BACKEND_URL"
            exit 1
          fi

      - name: Ping Backend Health Endpoint
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          BASE_URL="${BACKEND_URL%/}"
          HEALTH_URL="$BASE_URL/health"
          echo "Pinging backend at: $HEALTH_URL"

          response=$(curl -sS -o /dev/null -w "%{http_code}" \
            --connect-timeout 10 \
            --max-time 20 \
            --retry 3 \
            --retry-all-errors \
            "$HEALTH_URL")

          if [ "$response" = "200" ]; then
            echo "Backend is alive (HTTP $response)"
          else
            echo "Backend returned HTTP $response"
            exit 1
          fi

      - name: Log Success
        if: success()
        run: echo "Keep-alive check completed successfully at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      - name: Log Failure
        if: failure()
        run: echo "Keep-alive check failed. Verify BACKEND_URL and endpoint availability."
