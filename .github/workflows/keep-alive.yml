name: Keep Backend Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-backend:
    name: Ping backend health endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping /health endpoint
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          TARGET_URL="${BACKEND_URL:-https://voxflow-ai-site.onrender.com}"
          HEALTH_URL="${TARGET_URL%/}/health"

          echo "Pinging ${HEALTH_URL}"
          curl --fail --silent --show-error --max-time 30 --retry 3 --retry-delay 5 "${HEALTH_URL}"