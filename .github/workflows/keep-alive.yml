name: Keep Backend Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-backend:
    name: Ping backend keep-alive endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping /keep-alive endpoint
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "BACKEND_URL secret is not set. Skipping keep-alive ping."
            exit 0
          fi

          BASE_URL="${BACKEND_URL%/}"
          KEEP_ALIVE_URL="${BASE_URL}/keep-alive"
          HEALTH_URL="${BASE_URL}/health"
          ROOT_URL="${BASE_URL}/"

          echo "Backend URL: ${BASE_URL}"
          echo "Attempting to ping: ${KEEP_ALIVE_URL}"

          # Try keep-alive endpoint
          if curl --fail --silent --show-error --max-time 15 "${KEEP_ALIVE_URL}"; then
            echo "✓ Keep-alive ping successful"
            exit 0
          fi

          # If 404 or timeout, try health endpoint
          echo "Keep-alive endpoint not available, falling back to /health"
          if curl --fail --silent --show-error --max-time 15 "${HEALTH_URL}"; then
            echo "✓ Health endpoint ping successful (fallback)"
            exit 0
          fi

          # Last resort: try root
          echo "Health endpoint failed, trying root endpoint"
          if curl --fail --silent --show-error --max-time 15 "${ROOT_URL}"; then
            echo "✓ Root endpoint ping successful (last resort)"
            exit 0
          fi

          # Non-blocking warning
          echo "::warning::All backend endpoints are currently unreachable. Backend may be deploying or temporarily offline. Not failing this workflow run."
          exit 0