name: Keep Backend Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-backend:
    name: Ping backend keep-alive endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping /keep-alive endpoint
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "BACKEND_URL secret is not set. Skipping keep-alive ping."
            exit 0
          fi

          KEEP_ALIVE_URL="${BACKEND_URL%/}/keep-alive"

          echo "Pinging ${KEEP_ALIVE_URL}"
          if curl --fail --silent --show-error --max-time 30 --retry 6 --retry-delay 10 --retry-all-errors "${KEEP_ALIVE_URL}"; then
            echo "Keep-alive ping successful"
            exit 0
          fi

          echo "::warning::Keep-alive endpoint is currently unreachable. Not failing this workflow run."
          exit 0