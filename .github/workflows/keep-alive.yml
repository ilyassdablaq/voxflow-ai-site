name: Keep Backend Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-backend:
    name: Ping backend health endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping /health endpoint
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "BACKEND_URL secret is not set. Skipping keep-alive ping."
            exit 0
          fi

          TARGET_URL="$BACKEND_URL"
          HEALTH_URL="${TARGET_URL%/}/health"
          ROOT_URL="${TARGET_URL%/}/"

          echo "Pinging ${HEALTH_URL}"
          if curl --fail --silent --show-error --max-time 30 --retry 6 --retry-delay 10 --retry-all-errors "${HEALTH_URL}"; then
            echo "Health check successful"
            exit 0
          fi

          echo "Health endpoint failed, trying root endpoint ${ROOT_URL}"
          curl --fail --silent --show-error --max-time 30 --retry 4 --retry-delay 10 --retry-all-errors "${ROOT_URL}"