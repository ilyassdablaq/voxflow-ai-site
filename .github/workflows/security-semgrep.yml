name: Security Static Analysis

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main, development]

jobs:
  semgrep:
    name: Semgrep Security Rules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep
          semgrep --config .semgrep/security.yml --error
